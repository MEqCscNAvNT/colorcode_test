<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>抵抗カラーコード - RESISTOR RUSH (Speed Fever)</title>
    <style>
        /* スマホでの画面ズレ・スワイプを完全に防ぐための設定 */
        html {
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* テキスト選択防止 */
            -webkit-user-select: none; /* Safari用テキスト選択防止 */
            overflow: hidden;
            touch-action: none; /* デフォルトのタッチアクションを無効化 */
            overscroll-behavior: none; /* スクロール端のバウンスを無効化 */
            color: #fff;
            transition: background-color 0.5s ease;
        }

        /* フラッシュ演出用オーバーレイ */
        #flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.1s ease-out;
        }

        /* パステルカラーのフィーバー背景 */
        .fever-bg {
            animation: pastel-flow 4s linear infinite;
        }

        @keyframes pastel-flow {
            0%   { background-color: #ffb3ba; }
            25%  { background-color: #ffffba; }
            50%  { background-color: #baffc9; }
            75%  { background-color: #bae1ff; }
            100% { background-color: #ffb3ba; }
        }

        /* 設定画面 */
        #settings-area {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            border: 2px solid #444;
            z-index: 100;
        }

        .difficulty-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .diff-btn {
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.05s;
            text-transform: uppercase;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }
        .diff-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

        .btn-slow { background: #2ecc71; }
        .btn-normal { background: #3498db; }
        .btn-fast { background: #e74c3c; }

        /* ゲーム画面コンテナ */
        .game-container {
            background: #2c3e50;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align: center;
            width: 350px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 4px solid #34495e;
            z-index: 50;
        }

        /* シェイク演出 */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-4px, 0, 0) rotate(-2deg); }
            20%, 80% { transform: translate3d(6px, 0, 0) rotate(2deg); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(8px, 0, 0) rotate(2deg); }
        }

        /* ヘッダー */
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            font-weight: bold;
            font-size: 1.2rem;
            height: 30px;
            text-shadow: 2px 2px 0 #000;
        }
        .hearts { color: #ff4757; letter-spacing: -2px; text-align: left; min-width: 80px; }
        .bpm-info { color: #bdc3c7; font-size: 0.8rem; }
        .time-display { color: #f1c40f; width: 70px; text-align: right; font-family: 'Courier New', monospace; font-weight: bold; }

        /* スコア・コンボ */
        .score-board {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1rem;
            color: #bdc3c7;
            margin-bottom: -5px;
        }
        .combo-text { 
            color: #00cec9; 
            font-weight: 900; 
            display: none; 
            text-shadow: 2px 2px 0 #000;
        }
        .combo-active { display: block; animation: pop 0.2s; }

        /* 色カード */
        #color-card {
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            border: 4px solid #fff;
            border-radius: 15px;
            background: #fff;
            color: #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }

        /* リズムエリア */
        #rhythm-area {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: #2c3e50;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
        }
        
        .clap-wrapper { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .clap-item { opacity: 0; transform: scale(0.5); transition: all 0.05s; }
        .clap-visible { opacity: 1; transform: scale(1.2); }

        /* くっきり文字スタイル */
        .sharp-text {
            font-weight: 900;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* インジケーター */
        .phase-bar-wrapper {
            position: relative;
            width: 100%;
            height: 8px;
            background: #1a252f;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        .great-zone {
            position: absolute;
            left: 33.33%;
            width: 33.33%;
            height: 100%;
            background: rgba(46, 204, 113, 0.4);
            border-left: 1px solid rgba(255,255,255,0.5);
            border-right: 1px solid rgba(255,255,255,0.5);
            z-index: 1;
        }
        .phase-timer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #ff9f43, #ee5253);
            width: 100%;
            border-radius: 4px;
            z-index: 2;
        }

        /* キーパッド */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key {
            background: linear-gradient(to bottom, #ecf0f1, #bdc3c7);
            border: none;
            padding: 15px 0;
            font-size: 1.8rem;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 #7f8c8d;
            transition: all 0.05s;
            color: #2c3e50;
            font-weight: 900;
            touch-action: manipulation; /* 連打時のズーム防止 */
        }
        .key:active { transform: translateY(5px); box-shadow: none; }
        
        /* フィーバーテキスト */
        .fever-text {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            color: #fff;
            background: #e67e22;
            padding: 2px 0;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 0 #d35400;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transform: scale(0.8);
            transition: opacity 0.2s, transform 0.2s;
        }
        .fever-active .fever-text {
            opacity: 1;
            transform: scale(1);
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>

    <div id="settings-area">
        <h2 style="margin:0 0 5px 0; color:#fff; text-shadow:2px 2px 0 #000;">RESISTOR RUSH</h2>
        <p style="color:#bdc3c7; font-size:0.8rem; margin-bottom:20px;">COLOR CODE RHYTHM GAME</p>
        
        <div class="difficulty-buttons">
            <button class="diff-btn btn-slow" onclick="startGame(100)">SLOW <span style="font-size:0.8rem">(BPM 100)</span></button>
            <button class="diff-btn btn-normal" onclick="startGame(120)">NORMAL <span style="font-size:0.8rem">(BPM 120)</span></button>
            <button class="diff-btn btn-fast" onclick="startGame(200)">INSANE <span style="font-size:0.8rem">(BPM 200)</span></button>
        </div>
    </div>

    <div id="game-ui" class="game-container hidden">
        
        <div id="fever-overlay" class="fever-text">FEVER TIME!! x3 SCORE</div>

        <div class="info-header">
            <span id="hearts-display" class="hearts">❤️❤️❤️</span>
            <span id="bpm-display" class="bpm-info">BPM: 100</span>
            <span class="time-info">TIME: <span id="time-display" class="time-display">30.00</span></span>
        </div>

        <div class="score-board">
            <span style="text-shadow: 1px 1px 0 #000;">SCORE: <span id="score-val">0</span></span>
            <span id="combo-display" class="combo-text">0 COMBO!</span>
        </div>

        <div id="color-card">Ready</div>

        <div id="rhythm-area">
            <div class="clap-wrapper" id="clap-container"></div>
        </div>
        
        <div class="phase-bar-wrapper">
            <div class="great-zone"></div>
            <div id="phase-bar" class="phase-timer"></div>
        </div>

        <div class="keypad">
            <button class="key" onclick="handleInput(1)">1</button>
            <button class="key" onclick="handleInput(2)">2</button>
            <button class="key" onclick="handleInput(3)">3</button>
            <button class="key" onclick="handleInput(4)">4</button>
            <button class="key" onclick="handleInput(5)">5</button>
            <button class="key" onclick="handleInput(6)">6</button>
            <button class="key" onclick="handleInput(7)">7</button>
            <button class="key" onclick="handleInput(8)">8</button>
            <button class="key" onclick="handleInput(9)">9</button>
            <button class="key" disabled style="opacity:0.3; background:#95a5a6;">*</button>
            <button class="key" onclick="handleInput(0)">0</button>
            <button class="key" disabled style="opacity:0.3; background:#95a5a6;">#</button>
        </div>
    </div>

    <script>
        // ★ スマホのスワイプによる画面スクロールをJavaScriptからも強制ブロック
        document.addEventListener('touchmove', function(event) {
            event.preventDefault();
        }, { passive: false });

        const colors = [
            { val: 0, name: '黒', hex: '#000000', text: 'white' },
            { val: 1, name: '茶', hex: '#8B4513', text: 'white' },
            { val: 2, name: '赤', hex: '#FF0000', text: 'white' },
            { val: 3, name: '橙', hex: '#FFA500', text: 'black' },
            { val: 4, name: '黄', hex: '#FFFF00', text: 'black' },
            { val: 5, name: '緑', hex: '#008000', text: 'white' },
            { val: 6, name: '青', hex: '#0000FF', text: 'white' },
            { val: 7, name: '紫', hex: '#EE82EE', text: 'black' },
            { val: 8, name: '灰', hex: '#808080', text: 'white' },
            { val: 9, name: '白', hex: '#FFFFFF', text: 'black' }
        ];

        let score = 0;
        let combo = 0;
        let lives = 3;
        let timeLeft = 30.0;
        let isPlaying = false;
        let currentTarget = null;
        let beatCount = 0;
        
        let expectedTime = 0;
        let beatTimerId = null; 
        
        let timerIntervalId = null;
        let baseBpm = 100;
        let currentBpm = 100;
        let beatMs = 600;
        let isAnswered = false; 
        let isFever = false;
        
        let isRecovering = false; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const ui = document.getElementById('game-ui');
        const settings = document.getElementById('settings-area');
        const timeDisplay = document.getElementById('time-display');
        const heartsDisplay = document.getElementById('hearts-display');
        const bpmDisplay = document.getElementById('bpm-display');
        const scoreVal = document.getElementById('score-val');
        const comboDisplay = document.getElementById('combo-display');
        const colorCard = document.getElementById('color-card');
        const rhythmArea = document.getElementById('rhythm-area');
        const clapContainer = document.getElementById('clap-container');
        const phaseBar = document.getElementById('phase-bar');
        const body = document.body;
        const flashOverlay = document.getElementById('flash-overlay');

        function playTone(freq, type = 'sine', duration = 0.1, timeOffset = 0, vol = 0.5) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + timeOffset);
            
            if(type === 'square') {
                osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + timeOffset + 0.1);
            }

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime + timeOffset;
            osc.start(now);
            gain.gain.setValueAtTime(vol, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.stop(now + duration);
        }

        function playClapSound() {
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1200;
            filter.Q.value = 1.0;

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            noiseSource.start();
        }

        function playKickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playJazzBass(freq, timeOffset = 0) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = 'sawtooth'; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + timeOffset);

            filter.type = 'lowpass';
            filter.Q.value = 1.0; 

            const start = audioCtx.currentTime + timeOffset;
            
            filter.frequency.setValueAtTime(1000, start);
            filter.frequency.exponentialRampToValueAtTime(100, start + 0.15);
            gain.gain.setValueAtTime(0, start);
            gain.gain.linearRampToValueAtTime(0.7, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, start + 0.35);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(start);
            osc.stop(start + 0.4);
        }

        function playJazzPiano(freqs, timeOffset = 0, duration = 0.8) {
            const start = audioCtx.currentTime + timeOffset;
            
            freqs.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.08, start + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(start);
                osc.stop(start + duration + 0.1);

                const tineOsc = audioCtx.createOscillator();
                const tineGain = audioCtx.createGain();
                tineOsc.type = 'triangle';
                tineOsc.frequency.setValueAtTime(freq * 2, start); 
                tineGain.gain.setValueAtTime(0, start);
                tineGain.gain.linearRampToValueAtTime(0.03, start + 0.01);
                tineGain.gain.exponentialRampToValueAtTime(0.001, start + 0.3); 
                
                tineOsc.connect(tineGain);
                tineGain.connect(audioCtx.destination);
                tineOsc.start(start);
                tineOsc.stop(start + 0.4);
            });
        }

        function playSuccessSound(comboCount) {
            const baseFreq = 880; 
            const steps = [0, 2, 4, 7, 9, 12, 14, 16, 19, 21, 24];
            const stepIndex = Math.min(comboCount, steps.length - 1);
            const freq = baseFreq * Math.pow(2, steps[stepIndex] / 12);
            
            playTone(freq, 'sine', 0.2, 0, 0.4);
            playTone(freq * 1.5, 'triangle', 0.3, 0.05, 0.2);
        }

        function startGame(bpm) {
            baseBpm = bpm;
            currentBpm = bpm;
            updateTempoVar();

            score = 0;
            combo = 0;
            lives = 3;
            timeLeft = 30.00;
            beatCount = 0;
            isPlaying = true;
            isAnswered = true; 
            isFever = false;
            isRecovering = false;

            updateUI();
            resetFever();
            
            phaseBar.style.transition = 'none';
            phaseBar.style.width = '100%';

            settings.classList.add('hidden');
            ui.classList.remove('hidden');

            nextQuestion();

            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            clearInterval(timerIntervalId);
            timerIntervalId = setInterval(updateTimer, 100);

            clearTimeout(beatTimerId);
            expectedTime = performance.now();
            runBeat(); 
        }

        function updateTempoVar() {
            beatMs = 60000 / currentBpm;
            bpmDisplay.innerText = `BPM: ${currentBpm}`;
        }

        function updateTimer() {
            if (!isPlaying) return;
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                updateUI();
                endGame("TIME UP!");
                return;
            }
            updateUI();
        }

        function updateUI() {
            timeDisplay.innerText = timeLeft.toFixed(2);
            scoreVal.innerText = score;
            
            let hearts = "";
            for(let i=0; i<lives; i++) hearts += "❤️";
            heartsDisplay.innerText = hearts;

            if (combo > 1) {
                comboDisplay.innerText = combo + " COMBO!";
                comboDisplay.classList.add('combo-active');
            } else {
                comboDisplay.classList.remove('combo-active');
                comboDisplay.style.display = 'none';
            }
        }

        function nextQuestion() {
            currentTarget = colors[Math.floor(Math.random() * colors.length)];
        }

        function triggerFlash() {
            flashOverlay.style.opacity = '0.6';
            setTimeout(() => {
                flashOverlay.style.opacity = '0';
            }, 50);
        }

        function triggerShake() {
            ui.classList.remove('shake');
            void ui.offsetWidth; 
            ui.classList.add('shake');
        }

        function checkFever() {
            if (combo >= 5) { 
                if (!isFever) {
                    isFever = true;
                    body.classList.add('fever-bg'); 
                    ui.classList.add('fever-active');
                    playTone(600, 'sawtooth', 0.5, 0, 0.3);
                    playTone(1200, 'sawtooth', 0.5, 0.1, 0.3);
                }
            } else {
                resetFever();
            }
        }

        function resetFever() {
            isFever = false;
            body.classList.remove('fever-bg');
            ui.classList.remove('fever-active');
            body.style.backgroundColor = '#1a1a1a';
            
            if (currentBpm !== baseBpm) {
                currentBpm = baseBpm;
                updateTempoVar();
            }
        }

        const bassLines = [
            [55.00, 65.41, 82.41, 77.78],   // Bar 0: Am7
            [73.42, 92.50, 110.00, 103.83], // Bar 1: D7
            [98.00, 61.74, 73.42, 69.30],   // Bar 2: Gmaj7
            [65.41, 73.42, 82.41, 87.31],   // Bar 3: Cmaj7
            [92.50, 110.00, 82.41, 65.41],  // Bar 4: F#m7b5
            [61.74, 77.78, 92.50, 87.31],   // Bar 5: B7
            [82.41, 98.00, 123.47, 146.83], // Bar 6: Em7
            [164.81, 146.83, 123.47, 116.54] // Bar 7: E7
        ];

        const pianoChords = [
            [261.63, 329.63, 392.00, 493.88], // Am9
            [261.63, 329.63, 369.99, 493.88], // D13
            [246.94, 293.66, 369.99, 440.00], // Gmaj9
            [246.94, 293.66, 329.63, 392.00], // Cmaj9
            [220.00, 261.63, 329.63, 392.00], // F#m7b5
            [220.00, 261.63, 311.13, 392.00], // B7b9
            [196.00, 246.94, 293.66, 369.99], // Em9
            [207.65, 293.66, 349.23, 392.00]  // E7b9
        ];

        function runBeat() {
            if (!isPlaying || isRecovering) return;

            const phase = beatCount % 4;
            const bar = Math.floor(beatCount / 4) % 8; 
            const sec = beatMs / 1000;
            const eighth = sec / 2; 

            // =====================================
            // ★ BGM再生（解答状態に関わらず常に鳴らす）
            // =====================================
            if (phase === 0) {
                playTone(300, 'sine', 0.1, 0, 0.4); 
                playKickSound();
                if (isFever) {
                    playJazzBass(bassLines[bar][0], 0);
                    if (bar === 2 || bar === 5 || bar === 7) playJazzPiano(pianoChords[bar], 0);
                }
            }
            else if (phase === 1) {
                playClapSound(); 
                if (isFever) {
                    playJazzBass(bassLines[bar][1], 0);
                    if (bar === 0) playJazzPiano(pianoChords[bar], 0); 
                    if (bar === 4) playJazzPiano(pianoChords[bar], eighth); 
                }
            }
            else if (phase === 2) {
                playClapSound();
                playKickSound();
                if (isFever) {
                    playJazzBass(bassLines[bar][2], 0);
                    if (bar === 6) playJazzPiano(pianoChords[bar], 0); 
                    if (bar === 1) playJazzPiano(pianoChords[bar], eighth); 
                }
            }
            else if (phase === 3) {
                if (isFever) {
                    playJazzBass(bassLines[bar][3], 0);
                    if (bar === 3) playJazzPiano(pianoChords[bar], 0); 
                }
            }

            // =====================================
            // ★ ゲームロジック・UI更新（まだ解答していない場合のみ）
            // =====================================
            if (phase === 0) {
                if (beatCount > 0 && !isAnswered) {
                    handleMiss("時間切れ");
                    return; 
                }
                
                isAnswered = false;
                resetPhaseBar();

                colorCard.innerText = currentTarget.name;
                colorCard.style.backgroundColor = currentTarget.hex;
                colorCard.style.color = currentTarget.text;
                colorCard.style.transform = "scale(1)";
                
                colorCard.animate([
                    { transform: 'scale(0.8) translateY(-10px)', opacity: 0 },
                    { transform: 'scale(1) translateY(0)', opacity: 1 }
                ], { duration: 150, easing: 'ease-out' });

                clapContainer.innerHTML = '';
                rhythmArea.style.fontSize = "2.8rem";
            }
            else if (phase === 1) {
                if (!isAnswered) {
                    clapContainer.innerHTML = '<span class="clap-item clap-visible">👏</span><span class="clap-item">👏</span>';
                }
            }
            else if (phase === 2) {
                if (!isAnswered) {
                    const items = clapContainer.querySelectorAll('.clap-item');
                    if (items.length > 1) items[1].classList.add('clap-visible');
                    startPhaseBar(beatMs * 2);
                }
            }
            else if (phase === 3) {
                if (!isAnswered) {
                    clapContainer.innerHTML = '<span class="sharp-text" style="color:#e74c3c;">???</span>';
                    playTone(800, 'sine', 0.1, 0, 0.2);
                }
            }

            beatCount++;

            expectedTime += beatMs;
            let delay = expectedTime - performance.now();
            if (delay < 0) {
                expectedTime = performance.now(); 
                delay = 0;
            }
            beatTimerId = setTimeout(runBeat, delay);
        }

        function resetPhaseBar() {
            phaseBar.style.transition = 'none';
            phaseBar.style.width = '100%';
        }
        
        function startPhaseBar(duration) {
            phaseBar.style.transition = `width ${duration}ms linear`;
            requestAnimationFrame(() => {
                phaseBar.style.width = '0%';
            });
        }

        function handleInput(num) {
            if (!isPlaying || isRecovering) return;
            if (isAnswered) return;

            const phase = (beatCount - 1) % 4;

            if (phase === 0 || phase === 1) {
                isAnswered = true;
                clapContainer.innerHTML = '<span class="sharp-text" style="color:#e74c3c; font-size:1.5rem;">お手つき×</span>';
                handleMiss("お手つき");
                return;
            }

            isAnswered = true;

            const currentWidth = phaseBar.getBoundingClientRect().width;
            const parentWidth = phaseBar.parentElement.getBoundingClientRect().width;
            const percentage = (currentWidth / parentWidth) * 100;

            phaseBar.style.transition = 'none';
            phaseBar.style.width = percentage + '%';

            if (num === currentTarget.val) {
                combo++;
                checkFever();

                let baseScore = 0;
                let okText = "";
                let okColor = "";
                let fontSize = "2rem";

                if (percentage >= 33.33 && percentage <= 66.66) {
                    baseScore = 100;
                    okText = isFever ? 'FEVER GREAT!!' : 'GREAT!!';
                    okColor = isFever ? '#f1c40f' : '#2ecc71'; 
                    fontSize = "2.4rem"; 
                } else {
                    baseScore = 50;
                    okText = isFever ? 'FEVER GOOD!' : 'GOOD!';
                    okColor = isFever ? '#e67e22' : '#3498db'; 
                }

                const multiplier = isFever ? 3 : 1;
                score += (baseScore * multiplier) + (combo * 10);
                
                timeLeft = Math.min(timeLeft + 1.5, 30); 

                playSuccessSound(combo);
                triggerFlash(); 
                
                clapContainer.innerHTML = `<span class="sharp-text" style="color:${okColor}; font-size:${fontSize};">${okText}</span>`;
                
                if (isFever) {
                    currentBpm += 5;
                    updateTempoVar();
                }

                updateUI();
                nextQuestion();
            } else {
                clapContainer.innerHTML = '<span class="sharp-text" style="color:#e74c3c; font-size:3rem;">✖</span>';
                handleMiss("MISS");
            }
        }

        function handleMiss(reason) {
            if (isRecovering) return;
            isRecovering = true;
            
            combo = 0;
            resetFever(); 
            triggerShake(); 
            
            playTone(150, 'sawtooth', 0.4);
            playTone(110, 'sawtooth', 0.4);

            lives--;
            updateUI();

            if (lives <= 0) {
                endGame("GAME OVER");
                return;
            }

            clearTimeout(beatTimerId);

            clapContainer.innerHTML = `<span class="sharp-text" style="color:#e74c3c; font-size:2rem;">${reason}</span>`;
            colorCard.innerText = 'WAIT...';
            colorCard.style.backgroundColor = '#95a5a6';
            colorCard.style.color = '#fff';
            colorCard.style.transform = "scale(0.9)";
            resetPhaseBar();

            setTimeout(() => {
                if (!isPlaying) return;
                isRecovering = false;
                beatCount = 0; 
                expectedTime = performance.now(); 
                nextQuestion();
                runBeat();
            }, 1500);
        }

        function endGame(msg) {
            isPlaying = false;
            clearTimeout(beatTimerId);
            clearInterval(timerIntervalId);
            phaseBar.style.transition = 'none';
            resetFever();
            
            if (audioCtx.state === 'running') {
                audioCtx.suspend();
            }
            
            setTimeout(() => {
                alert(`${msg}\n\nSCORE: ${score}\nMAX COMBO: ${combo}`);
                location.reload();
            }, 100);
        }
    </script>
</body>
</html>
